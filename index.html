<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Convidados</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header>
        <h1>Gestor de Convidados</h1>
    </header>

    <main>
        <!-- Botões de Navegação -->
        <div class="buttons">
            <button class="btn" onclick="toggleSection('convidados')">Lista de Convidados</button>
            <button class="btn" onclick="toggleSection('letraA')">Convidados com "A"</button>
            <button class="btn" onclick="toggleSection('cincoLetras')">Convidados com 5 Letras</button>
        </div>

        <!-- Lista de Convidados -->
        <section id="convidados" class="section" style="display: none;">
            <h2>Lista de Convidados</h2>
            <ul id="guestList">
                <li>Ana</li>
                <li>Pedro</li>
                <li>João</li>
                <li>Maria</li>
                <li>Alexandre</li>
                <li>Luana</li>
                <li>André</li>
                <li>Lucas</li>
                <li>Isabela</li>
                <li>Arthur</li>
            </ul>
            <div class="controls">
                <button class="btn" onclick="addGuest('convidados')">Adicionar Convidado</button>
                <button class="btn" onclick="removeGuest('convidados')">Remover Convidado</button>
                <button class="btn" onclick="sortList('convidados')">Ordenar Lista</button>
                <input type="text" id="filterConvidados" placeholder="Filtrar por nome" oninput="filterList('convidados')">
            </div>
        </section>

        <!-- Convidados com a letra "A" -->
        <section id="letraA" class="section" style="display: none;">
            <h2>Convidados com "A"</h2>
            <ul id="aList"></ul>
            <div class="controls">
                <button class="btn" onclick="addGuest('letraA')">Adicionar Convidado</button>
                <button class="btn" onclick="removeGuest('letraA')">Remover Convidado</button>
                <button class="btn" onclick="sortList('letraA')">Ordenar Lista</button>
                <input type="text" id="filterA" placeholder="Filtrar por nome" oninput="filterList('letraA')">
            </div>
        </section>

        <!-- Convidados com 5 Letras -->
        <section id="cincoLetras" class="section" style="display: none;">
            <h2>Convidados com 5 Letras</h2>
            <ul id="fiveLetterList"></ul>
            <div class="controls">
                <button class="btn" onclick="addGuest('cincoLetras')">Adicionar Convidado</button>
                <button class="btn" onclick="removeGuest('cincoLetras')">Remover Convidado</button>
                <button class="btn" onclick="sortList('cincoLetras')">Ordenar Lista</button>
                <input type="text" id="filterFiveLetters" placeholder="Filtrar por nome" oninput="filterList('cincoLetras')">
            </div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Gestor de Convidados</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
