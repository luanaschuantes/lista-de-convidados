<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestor de Convidados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Gestor de Convidados</h1>
    </header>

    <main>
        <section class="list-section">
            <h2>Convidados em Maiúsculas</h2>
            <ul id="upperCaseList"></ul>
        </section>

        <section class="list-section">
            <h2>Convidados que Começam com a Letra "A"</h2>
            <ul id="startsWithA"></ul>
        </section>

        <section class="list-section">
            <h2>Convidados com Mais de 5 Letras</h2>
            <ul id="moreThanFiveLetters"></ul>
        </section>

        <div>
            <p>Convidados que começam com a letra "A": <span id="countStartsWithA"></span></p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Gestor de Convidados</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
