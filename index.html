
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Convidados</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Lista de Convidados</h1>
    </header>

    <main class="container">
        <!-- Área de Botões para Mostrar/Ocultar Listas -->
        <section class="buttons">
            <button class="btn" onclick="toggleList('guestListContainer')">Mostrar Lista de Convidados</button>
            <button class="btn" onclick="toggleList('resultsContainer')">Mostrar Resultados</button>
        </section>

        <!-- Lista de Convidados -->
        <section id="guestListContainer" class="list-container" style="display: none;">
            <h2>Lista de Convidados</h2>
            <ul id="guestList">
                <li>Ana</li>
                <li>Pedro</li>
                <li>João</li>
                <li>Maria</li>
                <li>Alexandre</li>
                <li>Luana</li>
                <li>André</li>
                <li>Lucas</li>
                <li>Isabela</li>
                <li>Arthur</li>
            </ul>
        </section>

        <!-- Resultados -->
        <section id="resultsContainer" class="list-container" style="display: none;">
            <h2>Resultados</h2>
            <p><strong>Convidados com "A":</strong> <span id="countA"></span></p>
            <p><strong>Convidados com 5 letras:</strong> <span id="countFiveLetters"></span></p>
            <h3>Lista com nomes em maiúsculas:</h3>
            <ul id="uppercaseList"></ul>
        </section>

        <!-- Botão para Processar Lista -->
        <section class="buttons">
            <button class="btn" onclick="processGuestList()">Processar Lista</button>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Lista de Convidados</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
